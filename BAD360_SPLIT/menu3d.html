<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Menu 3D — powered by BAD360.ai</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root{--g:#C9A84C;--gl:#F0D78A;--gd:#6B4F0A;--bg:#07060A;--txt:#F2EDE4;--txt2:#9a8a68;--line:rgba(201,168,76,.18)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif}
#stage{position:fixed;inset:0;z-index:1}
.vignette{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse at 50% 42%,transparent 38%,rgba(7,6,10,.78) 100%)}

/* ── header ── */
#hd{position:fixed;top:0;left:0;right:0;z-index:10;text-align:center;padding:calc(14px + env(safe-area-inset-top)) 16px 6px}
#hd .k{color:var(--g);font-size:9px;letter-spacing:5px;text-transform:uppercase;font-family:'Playfair Display',serif}
#hd h1{font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;margin-top:3px;text-shadow:0 2px 18px rgba(0,0,0,.8)}
#cats{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
#cats button{font-family:'DM Sans';font-size:.68rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:6px 14px;border-radius:20px;border:1px solid var(--line);background:rgba(7,6,10,.55);backdrop-filter:blur(8px);color:var(--txt2);cursor:pointer;transition:.25s}
#cats button.on{color:var(--g);border-color:rgba(201,168,76,.55);background:rgba(201,168,76,.12);box-shadow:0 0 18px rgba(201,168,76,.18)}

/* ── card piatto ── */
#card{position:fixed;left:50%;bottom:calc(18px + env(safe-area-inset-bottom));transform:translateX(-50%);z-index:10;width:min(480px,calc(100vw - 28px));border-radius:22px;border:1px solid var(--line);background:linear-gradient(165deg,rgba(22,18,28,.82),rgba(10,8,14,.88));backdrop-filter:blur(14px);padding:18px 20px 14px;box-shadow:0 22px 60px rgba(0,0,0,.6);transition:opacity .3s,transform .3s}
#card.sw{opacity:0;transform:translateX(-50%) translateY(14px)}
#card .top{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
#card .nm{font-family:'Playfair Display',serif;font-size:1.28rem;font-weight:700;line-height:1.15}
#card .pr{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gl);white-space:nowrap}
#card .pr small{font-size:.7rem;color:var(--txt2);vertical-align:super}
#card .ds{color:#c8bda6;font-size:.84rem;line-height:1.55;margin-top:7px}
#card .al{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
#card .al span{font-size:.58rem;letter-spacing:.8px;color:var(--txt2);border:1px solid var(--line);border-radius:20px;padding:2px 9px;text-transform:uppercase}
#bdg{position:absolute;top:-11px;right:18px;background:linear-gradient(90deg,var(--gd),var(--g));color:#0a0805;font-size:.6rem;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;border-radius:20px;padding:4px 13px;box-shadow:0 4px 16px rgba(201,168,76,.4);display:none}
#str{position:absolute;top:-10px;left:18px;color:var(--gl);font-size:1rem;text-shadow:0 0 14px rgba(240,215,138,.9);display:none}

/* ── nav ── */
.arr{position:fixed;top:46%;z-index:11;width:42px;height:42px;border-radius:50%;border:1px solid var(--line);background:rgba(10,8,14,.55);backdrop-filter:blur(8px);color:var(--g);font-size:1.05rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.25s;user-select:none}
.arr:hover{background:rgba(201,168,76,.16);box-shadow:0 0 18px rgba(201,168,76,.25)}
#prev{left:12px}#next{right:12px}
#dots{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(4px + env(safe-area-inset-bottom));z-index:10;display:flex;gap:5px}
#dots i{width:5px;height:5px;border-radius:50%;background:rgba(201,168,76,.25);transition:.3s}
#dots i.on{background:var(--g);width:16px;border-radius:3px;box-shadow:0 0 8px rgba(201,168,76,.6)}

/* ── vetrina + footer ── */
#auto{position:fixed;top:calc(14px + env(safe-area-inset-top));right:14px;z-index:11;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt2);border:1px solid var(--line);border-radius:20px;background:rgba(10,8,14,.5);padding:6px 12px;cursor:pointer;transition:.25s}
#auto.on{color:var(--g);border-color:rgba(201,168,76,.5);box-shadow:0 0 14px rgba(201,168,76,.2)}
#pb{position:fixed;top:0;left:0;height:2px;z-index:12;background:linear-gradient(90deg,var(--gd),var(--gl));width:0%;transition:width .2s linear}
#ft{position:fixed;left:0;right:0;bottom:0;z-index:9;text-align:center;font-size:.54rem;letter-spacing:1.4px;color:rgba(154,138,104,.5);padding-bottom:2px;pointer-events:none}

/* fallback senza WebGL */
#fallback{display:none;position:fixed;inset:0;z-index:5;overflow-y:auto;padding:90px 18px 60px}
#fallback .fcard{max-width:560px;margin:0 auto 12px;border:1px solid var(--line);border-radius:14px;background:rgba(16,13,20,.9);padding:16px 18px}
@media (prefers-reduced-motion:reduce){#auto{display:none}}
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div class="vignette"></div>
<div id="pb"></div>

<header id="hd">
  <div class="k" id="venueName">HOTEL BAIA SARDINIA</div>
  <h1 id="venueSub">Il Menu</h1>
  <div id="cats"></div>
</header>

<button id="auto" title="Modalità vetrina">▶ vetrina</button>
<button class="arr" id="prev">‹</button>
<button class="arr" id="next">›</button>

<div id="card">
  <span id="bdg">Consigliato dallo chef</span><span id="str">✦</span>
  <div class="top"><span class="nm" id="cNm"></span><span class="pr"><span id="cPr"></span><small>€</small></span></div>
  <div class="ds" id="cDs"></div>
  <div class="al" id="cAl"></div>
</div>
<div id="dots"></div>
<div id="ft">ALLERGENI · REG. UE 1169/2011 — CHIEDI ALLO STAFF &nbsp;·&nbsp; MENU BY BAD360.AI</div>
<div id="fallback"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════ DATI — iniettabili dal backend (window.__MENU_DATA__) o da /api/menu-3d/structure ════ */
const DEMO={venue:"Hotel Baia Sardinia",subtitle:"Cucina di Sardegna",sections:[
 {category:"Antipasti",items:[
  {name:"Insalata di mare",price:18,style:"seafood",highlight:false,star:false,allergens:["molluschi","crostacei","pesce","sedano"],description:"Polpo e gamberi al vapore, verdure croccanti, agrumi e olio extravergine sardo."}]},
 {category:"Primi",items:[
  {name:"Culurgiones al pomodoro",price:16,style:"pasta",highlight:false,star:true,allergens:["glutine","uova","latte"],description:"Pasta fresca ripiena di patate, pecorino e menta, chiusa a spiga, con pomodoro fresco e basilico."},
  {name:"Fregola con arselle",price:19,style:"soup",highlight:true,star:false,allergens:["glutine","molluschi","pesce"],description:"Fregola sarda tostata, arselle del golfo e bottarga di muggine, mantecata nel suo brodo."},
  {name:"Zuppa gallurese",price:14,style:"soup",highlight:false,star:false,allergens:["glutine","latte","sedano"],description:"Pane raffermo, brodo di pecora e formaggi fusi al forno: il piatto povero più ricco di Gallura."}]},
 {category:"Secondi",items:[
  {name:"Porceddu sardo",price:24,style:"meat",highlight:false,star:true,allergens:[],description:"Maialino da latte cotto lentamente, pelle croccante e profumo di mirto, come da tradizione."},
  {name:"Tagliata di tonno rosso",price:26,style:"fish",highlight:true,star:false,allergens:["pesce","sesamo"],description:"Tonno rosso del Mediterraneo in crosta di sesamo, scottato, con verdure di stagione."}]},
 {category:"Dessert",items:[
  {name:"Seadas con miele",price:9,style:"dessert",highlight:false,star:true,allergens:["glutine","latte","uova"],description:"Sfoglia croccante fritta, cuore di pecorino fresco, miele di corbezzolo amaro."}]}]};

let MENU=window.__MENU_DATA__||null;
const boot=()=>MENU?init():fetch("/api/menu-3d/structure").then(r=>{if(!r.ok)throw 0;return r.json()})
 .then(d=>{MENU={venue:DEMO.venue,subtitle:DEMO.subtitle,sections:d.sections.map(s=>({...s,items:s.items.map(i=>({...i,style:styleFor(i.name,s.category)}))}))};init()})
 .catch(()=>{MENU=DEMO;init()});
function styleFor(n,c){n=n.toLowerCase();c=c.toLowerCase();
 if(/zupp|fregola|brodo/.test(n))return"soup";if(/tonno|pesce|branzino|orata/.test(n))return"fish";
 if(/mare|polpo|gamber/.test(n))return"seafood";if(/porceddu|tagliata|agnello|maial|manzo/.test(n))return"meat";
 if(c==="dessert")return"dessert";if(c==="primi")return"pasta";return"pasta"}

/* ════ THREE.JS — scena ════ */
let scene,camera,renderer,pedestal,dishGroup,particles,t0=Date.now(),webgl=true;
let FLAT=[],idx=0,autoTimer=null,autoOn=false;

function init(){
 FLAT=[];MENU.sections.forEach(s=>s.items.forEach(i=>FLAT.push({...i,category:s.category})));
 document.getElementById("venueName").textContent=(MENU.venue||"").toUpperCase();
 buildCats();buildDots();
 try{setup3D()}catch(e){webgl=false}
 if(!webgl||!renderer){fallback();return}
 show(0);animate();bindUI();
}

function setup3D(){
 const cv=document.getElementById("stage");
 renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true,alpha:true});
 renderer.setPixelRatio(Math.min(devicePixelRatio,2));
 renderer.setSize(innerWidth,innerHeight);
 scene=new THREE.Scene();
 scene.fog=new THREE.FogExp2(0x07060a,0.055);
 camera=new THREE.PerspectiveCamera(38,innerWidth/innerHeight,.1,100);
 camera.position.set(0,2.1,7.2);camera.lookAt(0,.4,0);

 // luci — golden hour da ristorante
 scene.add(new THREE.AmbientLight(0x2a2438,.9));
 const key=new THREE.SpotLight(0xffd98a,1.5,30,Math.PI/5,.45);key.position.set(3,7,4);scene.add(key);
 const rim=new THREE.PointLight(0xc9a84c,.9,20);rim.position.set(-4,2.5,-3);scene.add(rim);
 const fill=new THREE.PointLight(0x6a5acd,.25,18);fill.position.set(4,1,-4);scene.add(fill);

 // piedistallo
 pedestal=new THREE.Group();
 const baseM=new THREE.MeshStandardMaterial({color:0x14101a,metalness:.85,roughness:.35});
 const goldM=new THREE.MeshStandardMaterial({color:0xc9a84c,metalness:1,roughness:.25,emissive:0x3a2e08,emissiveIntensity:.4});
 const base=new THREE.Mesh(new THREE.CylinderGeometry(2.1,2.5,.5,64),baseM);base.position.y=-.95;
 const ring=new THREE.Mesh(new THREE.TorusGeometry(2.1,.035,16,90),goldM);ring.rotation.x=Math.PI/2;ring.position.y=-.69;
 pedestal.add(base,ring);scene.add(pedestal);

 // tavolo riflettente scuro
 const floor=new THREE.Mesh(new THREE.CircleGeometry(14,48),new THREE.MeshStandardMaterial({color:0x0a0810,metalness:.6,roughness:.5}));
 floor.rotation.x=-Math.PI/2;floor.position.y=-1.2;scene.add(floor);

 // particelle d'oro
 const pg=new THREE.BufferGeometry(),N=240,pos=new Float32Array(N*3);
 for(let i=0;i<N;i++){pos[i*3]=(Math.random()-.5)*16;pos[i*3+1]=Math.random()*7-1;pos[i*3+2]=(Math.random()-.5)*10-2}
 pg.setAttribute("position",new THREE.BufferAttribute(pos,3));
 particles=new THREE.Points(pg,new THREE.PointsMaterial({color:0xc9a84c,size:.035,transparent:true,opacity:.55}));
 scene.add(particles);

 dishGroup=new THREE.Group();scene.add(dishGroup);
 addEventListener("resize",()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
}

/* ── materiali food ── */
const M={
 plate:()=>new THREE.MeshStandardMaterial({color:0xf5f0e6,metalness:.1,roughness:.25}),
 plateRim:()=>new THREE.MeshStandardMaterial({color:0xc9a84c,metalness:.9,roughness:.3}),
 pasta:()=>new THREE.MeshStandardMaterial({color:0xe8c46a,roughness:.65}),
 sauce:()=>new THREE.MeshStandardMaterial({color:0xa83232,roughness:.4,metalness:.05}),
 herb:()=>new THREE.MeshStandardMaterial({color:0x4a7a3a,roughness:.7}),
 meat:()=>new THREE.MeshStandardMaterial({color:0x8a4a26,roughness:.55}),
 crust:()=>new THREE.MeshStandardMaterial({color:0xb87333,roughness:.45,metalness:.15}),
 fish:()=>new THREE.MeshStandardMaterial({color:0xc4506a,roughness:.5}),
 sesame:()=>new THREE.MeshStandardMaterial({color:0xf0e6c8,roughness:.8}),
 broth:()=>new THREE.MeshPhysicalMaterial({color:0xc87f3a,roughness:.05,metalness:0,transmission:.35,transparent:true,opacity:.85}),
 bowl:()=>new THREE.MeshStandardMaterial({color:0x2a2030,metalness:.4,roughness:.3}),
 honey:()=>new THREE.MeshPhysicalMaterial({color:0xd49a2a,roughness:.05,transmission:.45,transparent:true,opacity:.9}),
 shrimp:()=>new THREE.MeshStandardMaterial({color:0xe07a5a,roughness:.5}),
 lemon:()=>new THREE.MeshStandardMaterial({color:0xf0d000,roughness:.6}),
};
const rnd=(a,b)=>a+Math.random()*(b-a);

/* ── costruttori piatto per stile ── */
function buildPlate(g,r=1.55){
 const plate=new THREE.Mesh(new THREE.CylinderGeometry(r,r*.82,.09,64),M.plate());plate.position.y=-.6;
 const rim=new THREE.Mesh(new THREE.TorusGeometry(r*.97,.018,12,80),M.plateRim());rim.rotation.x=Math.PI/2;rim.position.y=-.55;
 g.add(plate,rim);return -.55}
function foodPasta(g){const y=buildPlate(g);
 const sauce=new THREE.Mesh(new THREE.CylinderGeometry(.95,1,.05,48),M.sauce());sauce.position.y=y+.05;g.add(sauce);
 for(let i=0;i<9;i++){const k=new THREE.Mesh(new THREE.TorusKnotGeometry(.16,.065,48,8,2,3),M.pasta());
  const a=i/9*Math.PI*2;k.position.set(Math.cos(a)*rnd(.15,.55),y+.16+rnd(0,.14),Math.sin(a)*rnd(.15,.55));
  k.rotation.set(rnd(0,3),rnd(0,3),rnd(0,3));k.scale.setScalar(rnd(.8,1.1));g.add(k)}
 for(let i=0;i<5;i++){const h=new THREE.Mesh(new THREE.SphereGeometry(.045,8,8),M.herb());
  h.position.set(rnd(-.5,.5),y+.36,rnd(-.5,.5));g.add(h)}}
function foodMeat(g){const y=buildPlate(g);
 for(let i=0;i<4;i++){const s=new THREE.Mesh(new THREE.BoxGeometry(.85,.16,.5),i%2?M.meat():M.crust());
  s.position.set(-.35+i*.22,y+.16+i*.13,0);s.rotation.y=.25+i*.06;s.rotation.z=.05;g.add(s)}
 const j=new THREE.Mesh(new THREE.CylinderGeometry(.65,.7,.035,40),M.honey());j.position.y=y+.05;j.position.x=.15;g.add(j);
 const r=new THREE.Mesh(new THREE.SphereGeometry(.06,8,8),M.herb());r.position.set(.5,y+.6,.2);g.add(r)}
function foodFish(g){const y=buildPlate(g);
 for(let i=0;i<5;i++){const sl=new THREE.Mesh(new THREE.BoxGeometry(.32,.22,.78),M.fish());
  sl.position.set(-.6+i*.3,y+.18,0);sl.rotation.z=.5;g.add(sl);
  const cr=new THREE.Mesh(new THREE.BoxGeometry(.05,.24,.8),M.sesame());cr.position.set(-.6+i*.3-.14,y+.18,0);cr.rotation.z=.5;g.add(cr)}
 const lm=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.05,24,1,false,0,Math.PI),M.lemon());
 lm.position.set(.75,y+.1,.45);lm.rotation.z=Math.PI/2;g.add(lm)}
function foodSoup(g){
 const bowl=new THREE.Mesh(new THREE.SphereGeometry(1.05,48,24,0,Math.PI*2,0,Math.PI/2.4),M.bowl());
 bowl.rotation.x=Math.PI;bowl.position.y=-.1;g.add(bowl);
 const broth=new THREE.Mesh(new THREE.CylinderGeometry(.92,.92,.06,48),M.broth());broth.position.y=-.14;g.add(broth);
 for(let i=0;i<14;i++){const f=new THREE.Mesh(new THREE.SphereGeometry(rnd(.05,.1),10,10),i%3?M.pasta():M.shrimp());
  const a=rnd(0,Math.PI*2),r=rnd(0,.7);f.position.set(Math.cos(a)*r,-.08,Math.sin(a)*r);g.add(f)}
 const base=new THREE.Mesh(new THREE.CylinderGeometry(.45,.55,.22,40),M.bowl());base.position.y=-.62;g.add(base)}
function foodSeafood(g){const y=buildPlate(g,1.4);
 for(let i=0;i<8;i++){const sh=new THREE.Mesh(new THREE.TorusGeometry(.16,.06,10,18,Math.PI*1.4),M.shrimp());
  const a=i/8*Math.PI*2;sh.position.set(Math.cos(a)*.55,y+.14,Math.sin(a)*.55);
  sh.rotation.set(Math.PI/2,0,a);g.add(sh)}
 for(let i=0;i<6;i++){const t=new THREE.Mesh(new THREE.SphereGeometry(.09,8,6),M.herb());
  t.position.set(rnd(-.4,.4),y+.12,rnd(-.4,.4));t.scale.y=.5;g.add(t)}
 const lm=new THREE.Mesh(new THREE.CylinderGeometry(.2,.2,.04,24),M.lemon());lm.position.set(0,y+.1,0);g.add(lm)}
function foodDessert(g){const y=buildPlate(g,1.2);
 const se=new THREE.Mesh(new THREE.SphereGeometry(.62,32,20),M.crust());se.scale.y=.42;se.position.y=y+.28;g.add(se);
 const hd=new THREE.Mesh(new THREE.CylinderGeometry(.5,.62,.05,40),M.honey());hd.position.y=y+.06;g.add(hd);
 for(let i=0;i<3;i++){const dr=new THREE.Mesh(new THREE.SphereGeometry(.05,10,10),M.honey());
  dr.position.set(rnd(-.7,.7),y+.08,rnd(-.5,.6));g.add(dr)}
 const mi=new THREE.Mesh(new THREE.SphereGeometry(.05,8,8),M.herb());mi.position.set(0,y+.6,0);g.add(mi)}
const BUILDERS={pasta:foodPasta,meat:foodMeat,fish:foodFish,soup:foodSoup,seafood:foodSeafood,dessert:foodDessert};

/* ── transizione piatto ── */
let swapT=0;
function show(i){
 idx=(i+FLAT.length)%FLAT.length;const it=FLAT[idx];
 // 3D
 if(webgl&&dishGroup){while(dishGroup.children.length)dishGroup.remove(dishGroup.children[0]);
  (BUILDERS[it.style]||foodPasta)(dishGroup);dishGroup.scale.setScalar(.01);swapT=1}
 // card
 const card=document.getElementById("card");card.classList.add("sw");
 setTimeout(()=>{
  document.getElementById("cNm").textContent=it.name;
  document.getElementById("cPr").textContent=Number.isInteger(it.price)?it.price:it.price.toFixed(2).replace(".",",");
  document.getElementById("cDs").textContent=it.description||"";
  document.getElementById("cAl").innerHTML=(it.allergens||[]).map(a=>`<span>${a}</span>`).join("");
  document.getElementById("bdg").style.display=it.highlight?"block":"none";
  document.getElementById("str").style.display=it.star?"block":"none";
  card.classList.remove("sw");
  syncCats();syncDots();
 },220);
}

/* ── UI ── */
function buildCats(){
 const el=document.getElementById("cats");
 el.innerHTML=MENU.sections.map(s=>`<button data-c="${s.category}">${s.category}</button>`).join("");
 el.addEventListener("click",e=>{const c=e.target.dataset.c;if(!c)return;
  const j=FLAT.findIndex(f=>f.category===c);if(j>=0)show(j)});
}
function syncCats(){const c=FLAT[idx].category;
 document.querySelectorAll("#cats button").forEach(b=>b.classList.toggle("on",b.dataset.c===c))}
function buildDots(){
 document.getElementById("dots").innerHTML=FLAT.map(()=>"<i></i>").join("")}
function syncDots(){
 document.querySelectorAll("#dots i").forEach((d,j)=>d.classList.toggle("on",j===idx))}
function bindUI(){
 document.getElementById("next").onclick=()=>{stopAuto();show(idx+1)};
 document.getElementById("prev").onclick=()=>{stopAuto();show(idx-1)};
 addEventListener("keydown",e=>{if(e.key==="ArrowRight")show(idx+1);if(e.key==="ArrowLeft")show(idx-1)});
 let sx=0;addEventListener("touchstart",e=>sx=e.touches[0].clientX,{passive:true});
 addEventListener("touchend",e=>{const dx=e.changedTouches[0].clientX-sx;
  if(Math.abs(dx)>46){stopAuto();show(idx+(dx<0?1:-1))}},{passive:true});
 document.getElementById("auto").onclick=toggleAuto;
}
function toggleAuto(){autoOn=!autoOn;const b=document.getElementById("auto");
 b.classList.toggle("on",autoOn);b.textContent=autoOn?"❚❚ vetrina":"▶ vetrina";
 if(autoOn)autoTimer=setInterval(()=>show(idx+1),6000);else clearInterval(autoTimer);
 document.getElementById("pb").style.width="0%"}
function stopAuto(){if(autoOn)toggleAuto()}

/* ── loop ── */
let pbT=0;
function animate(){
 requestAnimationFrame(animate);
 const t=(Date.now()-t0)/1000;
 if(dishGroup){dishGroup.rotation.y=t*.45;
  if(swapT>0){swapT=Math.max(0,swapT-.04);const s=1-swapT;dishGroup.scale.setScalar(.2+s*.8);dishGroup.position.y=swapT*-.4}
  dishGroup.position.y+=Math.sin(t*1.4)*.0012}
 if(pedestal)pedestal.rotation.y=t*.45;
 if(particles){particles.rotation.y=t*.02;
  particles.material.opacity=.4+Math.sin(t*.8)*.15}
 camera.position.x=Math.sin(t*.12)*.35;camera.lookAt(0,.25,0);
 if(autoOn){pbT=(Date.now()%6000)/6000;document.getElementById("pb").style.width=(pbT*100)+"%"}
 renderer.render(scene,camera);
}

/* ── fallback elegante senza WebGL ── */
function fallback(){
 document.getElementById("stage").style.display="none";
 ["prev","next","auto","dots"].forEach(id=>document.getElementById(id).style.display="none");
 document.getElementById("card").style.display="none";
 const fb=document.getElementById("fallback");fb.style.display="block";document.body.style.overflow="auto";
