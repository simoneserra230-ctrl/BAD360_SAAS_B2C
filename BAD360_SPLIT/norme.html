<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BAD.S — Tracciabilità</title>
<style>
/* ═══════════════════════════════════════════════════════════════════════
   BAD.S F&B SUITE — DESIGN SYSTEM v8
   Direction: Professional Light — Istituzionale / Gestionale
   Fonts: DM Sans (ui) · DM Mono (mono) · BAD360 DS v4.0
═══════════════════════════════════════════════════════════════════════ */

:root {
  /* ── Surfaces ── */
  --bg:     #f0f3f8;
  --bg2:    #e8ecf3;
  --bg3:    #dde3ed;
  --bg4:    #ffffff;
  --bg5:    #f7f9fc;
  --canvas: #ffffff;

  /* ── Glass / card ── */
  --glass:        rgba(255,255,255,.75);
  --glass-hover:  rgba(255,255,255,.92);
  --glass-active: rgba(255,255,255,1);

  /* ── Borders ── */
  --border:  rgba(30,50,100,.10);
  --border2: rgba(30,50,100,.16);
  --border3: rgba(30,50,100,.24);

  /* ── Text ── */
  --text:  #1a2540;
  --text2: #5a6a8a;
  --text3: #94a3b8;
  --text4: #c8d3e8;

  /* ── Brand accent: institutional blue ── */
  --blue:      #2563eb;
  --blue2:     #3b82f6;
  --blue3:     #1d4ed8;
  --blue-dim:  rgba(37,99,235,.08);
  --blue-glow: rgba(37,99,235,.15);

  /* ── Functional palette (minimal) ── */
  --green:     #16a34a;
  --green-dim: rgba(22,163,74,.09);
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,.09);
  --red:       #dc2626;
  --red-dim:   rgba(220,38,38,.09);
  --slate:     #64748b;
  --slate-dim: rgba(100,116,139,.09);

  /* ── Legacy aliases for compatibility ── */
  --gold:   #d97706;
  --gold2:  #f59e0b;
  --gold3:  #b45309;
  --gold-dim:  rgba(217,119,6,.09);
  --gold-glow: rgba(217,119,6,.15);
  --teal:   #0891b2;
  --teal-dim:  rgba(8,145,178,.09);
  --purple: #7c3aed;
  --purple-dim:rgba(124,58,237,.09);

  /* ── Typography ── */
  --font:  'DM Sans', sans-serif;
  --serif: 'DM Sans', sans-serif;
  --mono:  'DM Mono', monospace;

  /* ── Geometry ── */
  --r:  12px;
  --r2:  8px;
  --r3: 999px;

  /* ── Elevation ── */
  --shadow-xs: 0 1px 3px rgba(15,30,70,.08), 0 1px 2px rgba(15,30,70,.05);
  --shadow-sm: 0 2px 8px rgba(15,30,70,.10), 0 1px 3px rgba(15,30,70,.06);
  --shadow-md: 0 4px 20px rgba(15,30,70,.12), 0 2px 8px rgba(15,30,70,.07);
  --shadow-lg: 0 10px 40px rgba(15,30,70,.14), 0 4px 16px rgba(15,30,70,.08);
  --shadow-gold: 0 0 20px rgba(217,119,6,.12);
}

/* ── Reset ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }
html { scroll-behavior:smooth }
html, body {
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  font-size:14px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ── Subtle grid background ── */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 10% 0%,  rgba(37,99,235,.04) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 90% 100%,rgba(8,145,178,.03)  0%, transparent 50%);
}
body::after {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  opacity:.25;
  background-image:
    linear-gradient(rgba(30,50,100,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(30,50,100,.035) 1px, transparent 1px);
  background-size:48px 48px;
}

/* ── Scrollbars ── */
::-webkit-scrollbar            { width:5px; height:5px }
::-webkit-scrollbar-track      { background:transparent }
::-webkit-scrollbar-thumb      { background:rgba(30,50,100,.18); border-radius:3px }
::-webkit-scrollbar-thumb:hover{ background:rgba(30,50,100,.30) }

/* ── Base ── */
button { cursor:pointer; font-family:var(--font); border:none; outline:none; transition:all .18s }
input, select, textarea { font-family:var(--font); outline:none }
a { color:var(--blue); text-decoration:none }
*:focus-visible { outline:2px solid var(--blue); outline-offset:2px; border-radius:4px }

/* ── Keyframes ── */
@keyframes fadeUp  { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
@keyframes fadeIn  { from{opacity:0} to{opacity:1} }
@keyframes shimmer { 0%{background-position:-250% center} 100%{background-position:250% center} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.4} }
@keyframes dot     { 0%,80%,100%{transform:scale(.55);opacity:.25} 40%{transform:scale(1);opacity:1} }
@keyframes spin    { to{transform:rotate(360deg)} }
.fade-up { animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both }

/* ═══════════════════════════════════════════════════════════════════════
   HEADER
═══════════════════════════════════════════════════════════════════════ */
#header {
  position:sticky; top:0; z-index:100;
  background:rgba(26,37,64,.97);
  backdrop-filter:blur(24px) saturate(180%);
  -webkit-backdrop-filter:blur(24px) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,.07);
}
#header::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg, #2563eb 0%, #3b82f6 40%, #0891b2 100%);
  opacity:.8;
}










/* ── Main nav ── */







.tab-icon { font-size:14px }

.haccp-tab.active::after { background:#dc2626!important }
.haccp-tab::after        { background:#dc2626!important }
.bmp-tab.active::after   { background:#d97706!important }
.bmp-tab::after          { background:#d97706!important }

/* ═══════════════════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════════════════ */
#content {
  max-width:1380px; margin:0 auto;
  padding:26px 28px 100px;
  position:relative; z-index:1;
}
.page { display:none }
.page.active { display:block }

/* ═══════════════════════════════════════════════════════════════════════
   SUB-NAVIGATION
═══════════════════════════════════════════════════════════════════════ */
.manager-subnav {
  display:flex; gap:3px; flex-wrap:wrap;
  background:var(--canvas);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:6px;
  margin-bottom:22px;
  box-shadow:var(--shadow-xs);
}
.subtab-btn {
  display:flex; align-items:center; gap:6px;
  background:transparent; color:var(--text3);
  border:1px solid transparent; border-radius:7px;
  padding:6px 12px; font-size:12px; font-weight:600;
  white-space:nowrap; cursor:pointer; transition:all .16s;
  font-family:var(--font);
}
.subtab-btn span { font-size:13px }
.subtab-btn.active {
  background:var(--blue-dim);
  border-color:rgba(37,99,235,.2);
  color:var(--blue);
}
.subtab-btn:hover:not(.active) { background:var(--bg); color:var(--text2) }

.bev-subpage  { display:none }
.shift-subpage{ display:none }
.bev-subpage.active  { display:block }
.shift-subpage.active{ display:block }

#shift-subnav-inner .subtab-btn.active {
  background:rgba(124,58,237,.08);
  border-color:rgba(124,58,237,.2);
  color:var(--purple);
}

/* ── Subnav groups ── */
.subnav-group {
  display:flex; align-items:center; gap:6px;
  padding:4px 6px 3px; margin-top:4px; width:100%;
  border-bottom:1px solid var(--border); margin-bottom:2px;
}
.subnav-group:first-child { margin-top:1px }
.subnav-group-label {
  font-family:var(--mono); font-size:8px; letter-spacing:2px;
  color:var(--text3); text-transform:uppercase; font-weight:600;
  white-space:nowrap; padding:0 2px; flex-shrink:0;
}
.subnav-group-line { flex:1; height:1px; background:linear-gradient(90deg, var(--border), transparent) }

/* ═══════════════════════════════════════════════════════════════════════
   MANAGER HEADER
═══════════════════════════════════════════════════════════════════════ */
.manager-header {
  display:flex; align-items:center; gap:18px;
  margin-bottom:20px; padding:18px 22px;
  background:var(--canvas); border:1px solid var(--border);
  border-radius:var(--r); box-shadow:var(--shadow-xs);
  position:relative; overflow:hidden;
}
.manager-header::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  background:linear-gradient(180deg, var(--blue) 0%, var(--teal) 100%);
}
.manager-header-icon {
  width:48px; height:48px; border-radius:14px; flex-shrink:0;
  background:linear-gradient(145deg, #3b82f6, #1d4ed8);
  display:flex; align-items:center; justify-content:center; font-size:20px;
  box-shadow:var(--shadow-sm);
}
.manager-header-text h1 {
  font-family:var(--serif); font-size:22px; font-weight:800;
  letter-spacing:-.4px; color:var(--text);
}
.manager-header-text p { font-size:11.5px; color:var(--text2); margin-top:3px; font-weight:500 }

/* ── Section title ── */
.section-title { display:flex; align-items:flex-start; gap:14px; margin-bottom:20px }
.section-bar {
  width:3px; flex-shrink:0; height:30px; margin-top:3px;
  background:linear-gradient(180deg, var(--blue) 0%, transparent 100%);
  border-radius:2px;
}
.section-title h2 {
  font-family:var(--serif); font-size:20px; font-weight:800;
  letter-spacing:-.3px; color:var(--text);
}
.section-title p { font-size:12px; color:var(--text2); margin-top:4px; line-height:1.65 }

/* ═══════════════════════════════════════════════════════════════════════
   CARDS
═══════════════════════════════════════════════════════════════════════ */
.card {
  background:var(--canvas);
  border:1px solid var(--border);
  border-radius:var(--r); padding:22px;
  box-shadow:var(--shadow-xs);
  transition:border-color .2s, box-shadow .2s;
  position:relative; overflow:hidden;
}
.card:hover { border-color:var(--border2); box-shadow:var(--shadow-sm) }
.card-accent { position:absolute; top:0; left:0; right:0; height:2px; z-index:1 }

/* ═══════════════════════════════════════════════════════════════════════
   GRID
═══════════════════════════════════════════════════════════════════════ */
.grid2  { display:grid; grid-template-columns:1fr 1fr; gap:16px }
.grid3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px }
.grid4  { display:grid; grid-template-columns:repeat(4,1fr); gap:14px }
.grid21 { display:grid; grid-template-columns:2fr 1fr; gap:16px }
@media(max-width:960px) { .grid4{grid-template-columns:1fr 1fr} .grid21{grid-template-columns:1fr} }
@media(max-width:660px) { .grid2,.grid3{grid-template-columns:1fr} .grid4{grid-template-columns:1fr 1fr} }

/* ═══════════════════════════════════════════════════════════════════════
   KPI
═══════════════════════════════════════════════════════════════════════ */
.kpi-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--text3); text-transform:uppercase; margin-bottom:9px }
.kpi-value { font-family:var(--serif); font-size:32px; font-weight:800; letter-spacing:-.7px; line-height:1; margin-bottom:6px }
.kpi-sub   { font-size:12px; color:var(--text2) }
.kpi-note  { font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:10px; padding-top:10px; border-top:1px solid var(--border) }
.kpi-delta { font-family:var(--mono); font-size:10px; font-weight:700; margin-top:4px }

/* ═══════════════════════════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:9px 17px; border-radius:var(--r2);
  font-weight:700; font-size:13px; transition:all .18s;
}
.btn-gold {
  background:linear-gradient(135deg, var(--blue), var(--blue3));
  color:#fff; box-shadow:0 2px 8px var(--blue-glow);
}
.btn-gold:hover { transform:translateY(-1px); box-shadow:0 5px 16px var(--blue-glow) }
.btn-gold:active { transform:none }
.btn-outline {
  background:var(--canvas); color:var(--text2);
  border:1px solid var(--border2);
}
.btn-outline:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-dim) }
.btn-danger {
  background:var(--red-dim); color:var(--red); border:1px solid rgba(220,38,38,.2);
}
.btn-danger:hover { background:rgba(220,38,38,.15) }
.btn-sm   { padding:5px 11px; font-size:11.5px }
.btn-icon { padding:7px; border-radius:9px; font-size:15px }

/* ═══════════════════════════════════════════════════════════════════════
   ALERTS
═══════════════════════════════════════════════════════════════════════ */
.alert {
  display:flex; align-items:center; gap:12px;
  padding:11px 16px; border-radius:var(--r2); margin-bottom:10px; font-size:13px;
}
.alert-red    { background:var(--red-dim);   border:1px solid rgba(220,38,38,.2) }
.alert-yellow { background:var(--amber-dim); border:1px solid rgba(217,119,6,.2) }
.alert-green  { background:var(--green-dim); border:1px solid rgba(22,163,74,.2) }
.alert-dot    { width:6px; height:6px; border-radius:50%; flex-shrink:0 }
.dot-red      { background:var(--red) }
.dot-yellow   { background:var(--amber) }
.dot-green    { background:var(--green) }

/* ═══════════════════════════════════════════════════════════════════════
   PILLS / BADGES
═══════════════════════════════════════════════════════════════════════ */
.pill {
  display:inline-flex; align-items:center;
  padding:2px 9px; border-radius:var(--r3);
  font-family:var(--mono); font-size:9.5px; font-weight:600; letter-spacing:.6px;
}
.pill-blue   { background:var(--blue-dim);  color:var(--blue);  border:1px solid rgba(37,99,235,.2) }
.pill-gold   { background:var(--amber-dim); color:var(--amber); border:1px solid rgba(217,119,6,.2) }
.pill-green  { background:var(--green-dim); color:var(--green); border:1px solid rgba(22,163,74,.2) }
.pill-red    { background:var(--red-dim);   color:var(--red);   border:1px solid rgba(220,38,38,.2) }
.pill-teal   { background:var(--teal-dim);  color:var(--teal);  border:1px solid rgba(8,145,178,.2) }
.pill-slate  { background:var(--slate-dim); color:var(--slate); border:1px solid rgba(100,116,139,.2) }

/* ═══════════════════════════════════════════════════════════════════════
   TABLES
═══════════════════════════════════════════════════════════════════════ */
.table-wrap { overflow-x:auto; border-radius:var(--r2); border:1px solid var(--border); box-shadow:var(--shadow-xs) }
table { width:100%; border-collapse:collapse; font-size:12.5px; background:var(--canvas) }
thead tr { background:var(--bg5); border-bottom:1px solid var(--border) }
thead th {
  padding:10px 14px; color:var(--text3); text-align:left;
  font-family:var(--mono); font-size:9px; letter-spacing:1.5px;
  font-weight:600; white-space:nowrap; text-transform:uppercase;
}
tbody tr { border-bottom:1px solid var(--border); transition:background .1s }
tbody tr:hover { background:var(--bg5) }
tbody td { padding:11px 14px; vertical-align:middle }
tbody tr:last-child { border-bottom:none }

/* ═══════════════════════════════════════════════════════════════════════
   FORMS
═══════════════════════════════════════════════════════════════════════ */
.field { margin-bottom:15px }
.field label {
  display:block; font-family:var(--mono); font-size:9px;
  letter-spacing:1.5px; color:var(--text3); margin-bottom:7px; text-transform:uppercase;
}
.field input, .field select, .field textarea {
  width:100%; background:var(--bg5); border:1px solid var(--border);
  border-radius:var(--r2); padding:9px 13px;
  color:var(--text); font-size:13px;
  transition:border-color .15s, box-shadow .15s;
}
.field input:focus, .field select:focus, .field textarea:focus {
  border-color:rgba(37,99,235,.4); background:var(--canvas);
  box-shadow:0 0 0 3px rgba(37,99,235,.07);
}
.field-hint { font-size:10.5px; color:var(--text3); margin-top:5px }

/* ═══════════════════════════════════════════════════════════════════════
   MODALS
═══════════════════════════════════════════════════════════════════════ */
.overlay {
  position:fixed; inset:0; background:rgba(15,25,60,.55);
  z-index:500; display:flex; align-items:center; justify-content:center;
  padding:20px; backdrop-filter:blur(8px); animation:fadeIn .2s ease;
}
.modal {
  background:var(--canvas); border:1px solid var(--border2);
  border-radius:18px; padding:28px; width:100%; max-width:560px;
  max-height:90vh; overflow-y:auto;
  box-shadow:var(--shadow-lg);
  animation:fadeUp .28s cubic-bezier(.16,1,.3,1);
  position:relative;
}
.modal::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg, var(--blue), var(--teal));
  border-radius:18px 18px 0 0;
}
.modal-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px }
.modal-title { font-family:var(--serif); font-size:19px; font-weight:800; letter-spacing:-.3px }
.modal-close {
  background:var(--bg); border:1px solid var(--border); color:var(--text2);
  width:32px; height:32px; border-radius:9px; font-size:16px;
  display:flex; align-items:center; justify-content:center;
}
.modal-close:hover { color:var(--text); border-color:var(--border2) }
.form-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:0 16px }
.full { grid-column:1/-1 }

/* ── AI Chat ── */
.chat-wrap     { display:flex; flex-direction:column; height:530px }
.chat-messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding-bottom:8px }
.msg           { max-width:90%; border-radius:var(--r) }
.msg-assistant { align-self:flex-start; background:var(--bg5); border:1px solid var(--border); padding:14px 18px }
.msg-user      { align-self:flex-end; background:var(--blue-dim); border:1px solid rgba(37,99,235,.18); padding:12px 17px }
.msg-header    { display:flex; align-items:center; gap:7px; margin-bottom:8px }
.msg-name      { font-family:var(--mono); font-size:9px; color:var(--blue); letter-spacing:1.2px; font-weight:700 }
.msg-text      { font-size:13.5px; line-height:1.75; color:var(--text) }
.msg-text strong { color:var(--blue) }
.chat-input-wrap { border-top:1px solid var(--border); padding-top:14px; margin-top:10px }
.quick-btns    { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px }
.quick-btn     { background:var(--bg5); border:1px solid var(--border); color:var(--text2); border-radius:var(--r3); padding:5px 12px; font-size:11px }
.quick-btn:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-dim) }
.chat-row      { display:flex; gap:8px }
.chat-input    { flex:1; background:var(--bg5); border:1px solid var(--border); border-radius:var(--r2); padding:10px 13px; color:var(--text); font-size:13px }
.chat-input:focus { border-color:rgba(37,99,235,.35) }
.thinking-dots { display:flex; gap:5px; padding:12px 16px; align-items:center }
.thinking-dots span { width:7px; height:7px; border-radius:50%; background:var(--blue); display:inline-block }
.thinking-dots span:nth-child(1) { animation:dot 1.4s 0s infinite }
.thinking-dots span:nth-child(2) { animation:dot 1.4s .16s infinite }
.thinking-dots span:nth-child(3) { animation:dot 1.4s .32s infinite }

/* ── Toast ── */
#toast {
  position:fixed; bottom:32px; left:50%;
  transform:translateX(-50%) translateY(14px);
  background:rgba(26,37,64,.97);
  border:1px solid rgba(22,163,74,.35);
  color:#4ade80; font-weight:700; font-size:12px; font-family:var(--mono);
  padding:10px 22px; border-radius:var(--r3); z-index:9999;
  box-shadow:var(--shadow-md); white-space:nowrap; pointer-events:none; opacity:0;
  transition:all .28s cubic-bezier(.16,1,.3,1);
  backdrop-filter:blur(16px); letter-spacing:.3px;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0) }
#toast.err  { border-color:rgba(220,38,38,.35); color:#f87171 }

/* ── Progress ── */
.progress-bar  { height:4px; background:var(--border); border-radius:3px; overflow:hidden; margin:6px 0 }
.progress-fill { height:100%; border-radius:3px; transition:width .6s cubic-bezier(.16,1,.3,1) }

/* ── Warn / API badges ── */
.warn-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--red-dim); color:var(--red); border:1px solid rgba(220,38,38,.2);
  border-radius:var(--r3); padding:5px 12px; font-size:10.5px; font-weight:700;
  cursor:pointer; animation:pulse 2.5s infinite;
}
.api-badge {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--amber-dim); color:var(--amber); border:1px solid rgba(217,119,6,.2);
  border-radius:var(--r3); padding:5px 12px; font-size:10.5px; font-weight:700; cursor:pointer;
}

/* ── Charts ── */
.chart-box { width:100%; background:var(--bg5); border-radius:var(--r2); position:relative; overflow:hidden }
canvas { display:block; width:100%!important }

/* ── Misc ── */
.divider    { height:1px; background:var(--border); margin:20px 0 }
.info-box   { background:var(--blue-dim); border:1px solid rgba(37,99,235,.15); border-radius:var(--r2); padding:14px 18px; font-size:12.5px; color:var(--text2); line-height:1.7 }
.info-box strong { color:var(--blue) }
.action-row { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border) }
.tag        { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:var(--r3); font-family:var(--mono); font-size:9.5px; font-weight:600 }

/* ── Events / Preventivo ── */
.prev-grid  { display:grid; grid-template-columns:1fr 80px 68px 100px; gap:5px 12px; align-items:center }
.prev-h     { font-family:var(--mono); font-size:9px; letter-spacing:1.2px; color:var(--text3); text-transform:uppercase; padding-bottom:9px; border-bottom:1px solid var(--border) }
.prev-label { font-size:13px; color:var(--text) }
.prev-total { font-family:var(--mono); font-size:13px; color:var(--blue); font-weight:700; text-align:right }
.prev-num   { background:var(--bg5); border:1px solid var(--border); border-radius:7px; padding:7px 8px; color:var(--text); font-family:var(--mono); font-size:12px; text-align:right; width:100%; transition:border-color .15s }
.prev-num:focus { border-color:rgba(37,99,235,.35) }
.rbox       { background:var(--bg5); border:1px solid var(--border); border-radius:var(--r2); padding:18px; text-align:center }
.rbox-label { font-family:var(--mono); font-size:9.5px; letter-spacing:1.2px; color:var(--text3); text-transform:uppercase; margin-bottom:8px }
.rbox-val   { font-family:var(--serif); font-size:28px; font-weight:800; letter-spacing:-.5px; line-height:1 }
.rbox-sub   { font-size:11px; color:var(--text2); margin-top:5px }
.sum-row    { display:flex; justify-content:space-between; align-items:center; padding:7px 0; font-size:13px; border-bottom:1px solid var(--border) }
.sum-row:last-child { border-bottom:none }
.sum-row.total { font-size:14px; padding-top:12px; margin-top:5px; border-top:2px solid var(--border2); border-bottom:none; font-weight:700 }
.sum-key { color:var(--text2) } .sum-val-ev { color:var(--text) }
.ev-divider { height:1px; background:var(--border); margin:16px 0 }
.ls-tbl     { width:100%; border-collapse:collapse; font-size:12.5px; background:var(--canvas) }
.ls-tbl th  { font-family:var(--mono); font-size:9px; letter-spacing:1.2px; color:var(--text3); text-transform:uppercase; padding:8px 12px; text-align:right; border-bottom:1px solid var(--border); background:var(--bg5) }
.ls-tbl th:first-child { text-align:left }
.ls-tbl td  { padding:9px 12px; border-bottom:1px solid var(--border); text-align:right; vertical-align:middle }
.ls-tbl td:first-child { text-align:left; color:var(--text) }
.ls-tbl tr:hover td { background:var(--bg5) }
.ls-tbl tfoot td { background:var(--blue-dim); color:var(--blue); font-weight:700; border-top:2px solid var(--border2) }
.ls-num  { width:52px; padding:5px 7px; text-align:right; font-size:12px; background:var(--bg5); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:var(--mono) }
.ls-num:focus { border-color:rgba(37,99,235,.35) }
.ls-range { width:60px; accent-color:var(--blue); vertical-align:middle }
.shop-item { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid var(--border); font-size:13px }
.shop-item:last-child { border-bottom:none }
.client-row { display:grid; grid-template-columns:1fr auto auto auto; align-items:center; gap:10px; padding:12px 18px; border-bottom:1px solid var(--border); transition:background .1s }
.client-row:hover { background:var(--bg5) }
.ev-client-name { font-family:var(--serif); font-size:15px; font-weight:700; cursor:pointer; color:var(--text); transition:color .15s }
.ev-client-name:hover { color:var(--blue) }
.ev-client-meta { font-size:11.5px; color:var(--text2); margin-top:2px }
.crm-badge { display:inline-block; font-family:var(--mono); font-size:9px; letter-spacing:.8px; text-transform:uppercase; padding:2px 9px; border:1px solid; border-radius:5px }
.cb-lead       { border-color:var(--border2); color:var(--text3) }
.cb-preventivo { border-color:rgba(217,119,6,.35); color:var(--amber) }
.cb-followup   { border-color:rgba(37,99,235,.35); color:var(--blue) }
.cb-chiuso     { border-color:rgba(22,163,74,.35);  color:var(--green) }
.cb-perso      { border-color:rgba(220,38,38,.35);  color:var(--red) }
.reminder-pill { display:flex; gap:10px; align-items:flex-start; padding:10px 14px; background:var(--bg5); border-left:2px solid var(--amber); border-radius:0 9px 9px 0; margin-bottom:8px; font-size:12.5px }
.reminder-pill.urgent { border-left-color:var(--red) }
.haccp-tab.active       { color:#fff!important }
.haccp-tab:not(.active) { color:rgba(255,255,255,.45)!important }
.bmp-tab.active         { color:#fff!important }
.bmp-tab:not(.active)   { color:rgba(255,255,255,.45)!important }

/* BCG */
.bcg-card  { border-radius:var(--r2); padding:14px; text-align:center }
.bcg-label { font-family:var(--mono); font-size:10px; letter-spacing:1.5px; font-weight:700; margin-bottom:3px }
.bcg-desc  { font-size:10.5px; color:var(--text2); line-height:1.6 }

/* Live preview */
.live-preview { display:grid; grid-template-columns:1fr 1fr; gap:10px; background:var(--bg5); border-radius:var(--r2); border:1px solid var(--border); padding:16px; margin-bottom:18px }
.lp-item label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; display:block; margin-bottom:4px }
.lp-item span  { font-family:var(--mono); font-size:20px; font-weight:500 }

/* ═══════════════════════════════════════════════════════════════════════
   PRO HUB STYLES — Hospitality Intelligence Module
═══════════════════════════════════════════════════════════════════════ */
.grid-2  { display:grid; grid-template-columns:1fr 1fr; gap:20px }
.grid-3  { display:grid; grid-template-columns:repeat(3,1fr); gap:20px }
.grid-4c { display:grid; grid-template-columns:repeat(4,1fr); gap:16px }

<script>
const NORME = [
  { cat:'alimentare', icon:'🍽️', src:'EU',  urgency:'critica', title:'Reg. UE 2024/1369 — Etichettatura allergeni OUT-OF-PACK', excerpt:'Nuovi obblighi per la comunicazione degli allergeni nella ristorazione: obbligo di informazione scritta accessibile per piatti non preconfezionati. Sanzioni fino a € 30.000.', date:'15 Gen 2025', readTime:'8 min', tags:['HACCP','Allergeni','Ristorazione'] },

  { cat:'sicurezza',  icon:'🛡️', src:'MIN',  urgency:'alta',    title:'D.Lgs 81/08 — Aggiornamento DVR per rischio chimico cucine', excerpt:'Il Ministero del Lavoro chiarisce gli obblighi di aggiornamento del DVR per il rischio chimico nelle cucine professionali. Nuovi valori limite esposizione professionale (VLEP 2025).', date:'10 Feb 2025', readTime:'6 min', tags:['DVR','Sicurezza','Cucine'] },

  { cat:'alimentare', icon:'🍽️', src:'MIN',  urgency:'media',   title:'ISO 22000:2018 — Nuove linee guida FSSC per ristorazione collettiva', excerpt:'Pubblicato l\'aggiornamento delle linee guida FSSC 22000 v6 per la ristorazione collettiva. Novità su prerequisiti operativi, gestione fornitori e tracciabilità digitale.', date:'3 Feb 2025', readTime:'7 min', tags:['ISO22000','FSSC','HACCP'] },

  { cat:'sicurezza',  icon:'🛡️', src:'EU',   urgency:'media',   title:'NIS2 — Cybersecurity obbligatoria per hotel con sistemi PMS cloud', excerpt:'La Direttiva NIS2 recepita in Italia impone misure di cybersecurity per strutture che gestiscono dati personali su sistemi cloud. PMS, POS e booking engine rientrano nell\'ambito.', date:'22 Feb 2025', readTime:'8 min', tags:['NIS2','Cybersecurity','PMS'] },

let currentNormFilter = 'all';

function filterNorm(f) {
  currentNormFilter = f;
  // Update button states
  document.querySelectorAll('#norme-filters .subtab-btn').forEach(b => {
    const isActive = b.getAttribute('onclick')?.includes("'"+f+"'");
    b.classList.toggle('active', isActive);
  });
  renderNorme();
}

function renderNorme() {
  const grid = document.getElementById('norme-grid');
  const urgEl = document.getElementById('norme-urgenti');
  const countEl = document.getElementById('norme-count');
  if (!grid) return;

  const filtered = currentNormFilter === 'all' ? NORME : NORME.filter(n => n.cat === currentNormFilter);
  const urgenti  = filtered.filter(n => n.urgency === 'critica' || n.urgency === 'alta');
  const normali  = filtered.filter(n => n.urgency !== 'critica' && n.urgency !== 'alta');

  if (countEl) countEl.textContent = filtered.length + ' aggiornamenti';

  // Urgenti banner
  if (urgEl) {
    const critica = filtered.filter(n => n.urgency === 'critica');
    if (critica.length) {
      urgEl.innerHTML = critica.map(n => `
        <div style="display:flex;align-items:center;gap:12px;background:rgba(220,38,38,.07);border:1px solid rgba(220,38,38,.2);border-radius:var(--r);padding:12px 18px;margin-bottom:10px">
          <div style="width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.5s infinite"></div>
          <div style="flex:1">
            <span class="pill pill-red" style="margin-right:8px">CRITICA</span>
            <strong style="font-size:13px">${n.title}</strong>
            <span style="font-size:12px;color:var(--text2);margin-left:10px">${n.date}</span>
          </div>
          <button class="btn btn-danger btn-sm">Approfondisci →</button>
        </div>`).join('');
    } else {
      urgEl.innerHTML = '';
    }
  }

  const srcColor = { EU:'var(--blue)', MIN:'var(--amber)', FIPE:'var(--green)' };
  const srcLabel = { EU:'🇪🇺 UE', MIN:'🏛️ Ministero', FIPE:'🤝 FIPE' };
  const urgColor = { critica:'var(--red)', alta:'var(--amber)', media:'var(--slate)', bassa:'var(--green)' };
  const urgLabel = { critica:'CRITICA', alta:'Alta', media:'Media', bassa:'Bassa' };

  grid.innerHTML = filtered.map(n => `
    <div class="card" style="cursor:pointer;transition:all .2s" onmouseover="this.style.boxShadow='var(--shadow-md)'" onmouseout="this.style.boxShadow=''">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="background:${srcColor[n.src]||'var(--slate-dim)'};color:${srcColor[n.src]||'var(--slate)'};font-size:9px;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid currentColor;opacity:.9">${srcLabel[n.src]||n.src}</span>
        <span style="font-size:10px;font-weight:700;color:${urgColor[n.urgency]||'var(--slate)'}">● ${urgLabel[n.urgency]||n.urgency}</span>
      </div>
      <div style="font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:8px">${n.title}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:12px">${n.excerpt}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
        ${n.tags.map(t=>`<span class="pill pill-blue">${t}</span>`).join('')}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)">
        <span style="font-family:var(--mono);font-size:10px;color:var(--text3)">${n.date} · ${n.readTime}</span>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation()">Leggi →</button>
      </div>
    </div>`).join('');
}

document.addEventListener('DOMContentLoaded', renderNorme);
