<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BAD360.ai — Normative</title>
<style>
/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.18);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,168,76,.30)}
button{cursor:pointer;font-family:var(--font);border:none;outline:none;transition:all .18s}
input,select,textarea{font-family:var(--font);outline:none}
a{color:var(--g);text-decoration:none}
*:focus-visible{outline:2px solid var(--g);outline-offset:2px;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Layout ── */
.nm-wrap{max-width:1380px;margin:0 auto;padding:26px 28px 100px;position:relative;z-index:1}

/* ── Page header ── */
.nm-header{
  display:flex;align-items:center;gap:18px;
  margin-bottom:20px;padding:18px 22px;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:12px;position:relative;overflow:hidden;
}
.nm-header::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--g) 0%,var(--gd) 100%);
}
.nm-icon{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.nm-header-text h1{font-family:var(--heading);font-size:22px;font-weight:800;letter-spacing:-.4px;color:var(--txt)}
.nm-header-text p{font-size:11.5px;color:var(--txt2);margin-top:3px}
.nm-count{
  font-family:var(--mono);font-size:10px;color:var(--txt2);
  padding:4px 12px;background:rgba(201,168,76,.06);
  border-radius:99px;border:1px solid var(--line);white-space:nowrap;
}

/* ── Subnav filters ── */
.nm-filters{
  display:flex;gap:3px;flex-wrap:wrap;
  background:var(--bg2);border:1px solid var(--line);
  border-radius:10px;padding:6px;margin-bottom:22px;
  position:sticky;top:52px;z-index:20;
}
.nm-btn{
  display:flex;align-items:center;gap:6px;
  background:transparent;color:var(--txt2);
  border:1px solid transparent;border-radius:7px;
  padding:6px 12px;font-size:12px;font-weight:600;
  white-space:nowrap;cursor:pointer;transition:all .16s;
}
.nm-btn span{font-size:13px}
.nm-btn.active{background:rgba(201,168,76,.12);border-color:rgba(201,168,76,.3);color:var(--g)}
.nm-btn:hover:not(.active){background:var(--bg3);color:var(--txt)}

/* ── Cards ── */
.nm-card{
  background:var(--bg2);border:1px solid var(--line);
  border-radius:12px;padding:22px;
  transition:border-color .2s,box-shadow .2s;cursor:pointer;
}
.nm-card:hover{border-color:var(--line2);box-shadow:0 8px 32px rgba(0,0,0,.25)}
.nm-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
  gap:16px;
}
@media(max-width:720px){.nm-grid{grid-template-columns:1fr}}

/* ── Urgenti banner ── */
.nm-urgente{
  display:flex;align-items:center;gap:12px;
  background:rgba(201,74,74,.07);border:1px solid rgba(201,74,74,.2);
  border-radius:10px;padding:12px 18px;margin-bottom:10px;
}
.nm-urgente-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0;animation:pulse 1.5s infinite}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 17px;border-radius:8px;font-weight:700;font-size:13px;transition:all .18s}
.btn-outline{background:transparent;color:var(--txt2);border:1px solid var(--line2)}
.btn-outline:hover{border-color:var(--g);color:var(--g);background:rgba(201,168,76,.06)}
.btn-danger{background:rgba(201,74,74,.08);color:var(--red);border:1px solid rgba(201,74,74,.2)}
.btn-danger:hover{background:rgba(201,74,74,.15)}
.btn-sm{padding:5px 11px;font-size:11.5px}

/* ── Pills ── */
.pill{display:inline-flex;align-items:center;padding:2px 9px;border-radius:99px;font-family:var(--mono);font-size:9.5px;font-weight:600;letter-spacing:.6px}
.pill-red{background:rgba(201,74,74,.09);color:var(--red);border:1px solid rgba(201,74,74,.22)}
.pill-dim{background:rgba(138,122,90,.07);color:var(--txt2);border:1px solid var(--line)}
</style>
<link rel="stylesheet" href="bad360-ds.css">
<script src="bad360-sdk.js"></script>
</head>
<body class="b360-module">

<header class="b360-topbar" id="b360-topbar">
<div class="b360-tb-l">
  <a href="index.html" class="b360-tb-back" title="Suite">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </a>
  <a href="index.html" class="b360-tb-brand" tabindex="-1">
    <div class="b360-tb-logo">B360</div>
    <span class="b360-tb-name">BAD<strong>360</strong>.ai</span>
  </a>
  <span class="b360-tb-sep"></span>
  <span class="b360-tb-module" id="b360-page-label">Suite</span>
</div>
<div class="b360-tb-r">
  <span class="b360-tb-pill"><span class="b360-tb-dot"></span>v4.1</span>
  <button class="b360-tb-theme" id="b360-theme-btn" title="Tema">☽</button>
</div>
</header>
<script>(function(){var t="dark";try{var s=localStorage.getItem("bad360_theme");if(s)t=s}catch(e){}document.documentElement.setAttribute("data-theme",t);document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("b360-theme-btn");if(b){b.textContent=t==="dark"?"☽":"☀";b.addEventListener("click",function(){var nt=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nt);b.textContent=nt==="dark"?"☽":"☀";try{localStorage.setItem("bad360_theme",nt)}catch(e){}});}var lbl=document.getElementById("b360-page-label");if(lbl){var title=document.title.replace("BAD360.ai — ","");if(title)lbl.textContent=title;}});})()</script>

<div class="nm-wrap">

  <div class="nm-header">
    <div class="nm-icon">📜</div>
    <div class="nm-header-text">
      <h1>Normative &amp; Trend — Hospitality 2025</h1>
      <p>Aggiornamenti normativi in tempo reale · EU · Ministero · Enti di settore</p>
    </div>
    <div style="margin-left:auto">
      <span class="nm-count" id="norme-count">— aggiornamenti</span>
    </div>
  </div>

  <div class="nm-filters" id="norme-filters">
    <button class="nm-btn active" onclick="filterNorm('all')">Tutte</button>
    <button class="nm-btn" onclick="filterNorm('alimentare')"><span>🍽️</span>Alimentare</button>
    <button class="nm-btn" onclick="filterNorm('ambientale')"><span>🌿</span>Ambientale</button>
    <button class="nm-btn" onclick="filterNorm('lavoro')"><span>👷</span>Lavoro</button>
    <button class="nm-btn" onclick="filterNorm('fiscale')"><span>💶</span>Fiscale</button>
    <button class="nm-btn" onclick="filterNorm('digitale')"><span>📱</span>Digitale</button>
    <button class="nm-btn" onclick="filterNorm('sicurezza')"><span>🛡️</span>Sicurezza</button>
  </div>

  <div id="norme-urgenti" style="margin-bottom:20px"></div>
  <div class="nm-grid" id="norme-grid"></div>

  <!-- Bandi & Finanziamenti -->
  <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--line)" id="nm-bandi-panel">
    <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--g);margin-bottom:6px;font-family:var(--mono)">Bandi & Finanziamenti</div>
    <div style="font-family:'Syne',sans-serif;font-size:1.15rem;font-weight:700;margin-bottom:14px">Cerca fondi per la tua struttura ricettiva</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <button style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--txt2);border:1px solid var(--line2);transition:all .15s" onmouseover="this.style.color='var(--g)';this.style.borderColor='rgba(201,168,76,.3)'" onmouseout="this.style.color='var(--txt2)';this.style.borderColor='var(--line2)'" onclick="cercaBandiNorme(['digitalizzazione','PMS','check-in digitale'])">💻 Digitalizzazione</button>
      <button style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--txt2);border:1px solid var(--line2);transition:all .15s" onmouseover="this.style.color='var(--g)';this.style.borderColor='rgba(201,168,76,.3)'" onmouseout="this.style.color='var(--txt2)';this.style.borderColor='var(--line2)'" onclick="cercaBandiNorme(['energia','rinnovabili','efficienza','Transizione 5.0'])">🌿 Energia & Efficienza</button>
      <button style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--txt2);border:1px solid var(--line2);transition:all .15s" onmouseover="this.style.color='var(--g)';this.style.borderColor='rgba(201,168,76,.3)'" onmouseout="this.style.color='var(--txt2)';this.style.borderColor='var(--line2)'" onclick="cercaBandiNorme(['turismo','PNRR','Sardegna','albergo'])">🏨 PNRR Turismo Sardegna</button>
      <button style="display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--txt2);border:1px solid var(--line2);transition:all .15s" onmouseover="this.style.color='var(--g)';this.style.borderColor='rgba(201,168,76,.3)'" onmouseout="this.style.color='var(--txt2)';this.style.borderColor='var(--line2)'" onclick="cercaBandiNorme(['ISO','certificazione','HACCP','qualità'])">🏅 Certificazioni</button>
    </div>
    <div id="nm-bandi-result"></div>
  </div>

</div>

<script>
const NORME = [
  { cat:'alimentare', icon:'🍽️', src:'EU',  urgency:'critica', title:'Reg. UE 2024/1369 — Etichettatura allergeni OUT-OF-PACK', excerpt:'Nuovi obblighi per la comunicazione degli allergeni nella ristorazione: obbligo di informazione scritta accessibile per piatti non preconfezionati. Sanzioni fino a € 30.000.', date:'15 Gen 2025', readTime:'8 min', tags:['HACCP','Allergeni','Ristorazione'] },
  { cat:'lavoro',     icon:'👷', src:'MIN',  urgency:'alta',    title:'CCNL Turismo 2024 — Aggiornamento tabelle retributive', excerpt:'Nuovi minimi tabellari per camerieri, cuochi e receptionist. Incremento medio +4,2%. Obbligo adeguamento entro 31 marzo 2025. Welfare aziendale e flessibilità oraria.', date:'1 Feb 2025', readTime:'6 min', tags:['CCNL','Retribuzione','HR'] },
  { cat:'ambientale', icon:'🌿', src:'EU',   urgency:'alta',    title:'Direttiva CSRD — Rendicontazione sostenibilità PMI alberghiere', excerpt:'La Corporate Sustainability Reporting Directive estende gli obblighi di reporting ESG alle PMI dal 2026. Strutture ricettive con >50 dipendenti iniziano la preparazione ora.', date:'20 Gen 2025', readTime:'7 min', tags:['ESG','CSRD','Sostenibilità'] },
  { cat:'fiscale',    icon:'💶', src:'MIN',  urgency:'alta',    title:'PNRR Turismo — Bandi digitalizzazione strutture aperte', excerpt:'Apertura sportello bandi PNRR misura 4.2 per digitalizzazione PMI turismo. Check-in digitale, PMS cloud, channel manager: fino a € 50.000 a fondo perduto. Scadenza 30 aprile.', date:'5 Feb 2025', readTime:'5 min', tags:['PNRR','Incentivi','Digitale'] },
  { cat:'sicurezza',  icon:'🛡️', src:'MIN',  urgency:'alta',    title:'D.Lgs 81/08 — Aggiornamento DVR per rischio chimico cucine', excerpt:'Il Ministero del Lavoro chiarisce gli obblighi di aggiornamento del DVR per il rischio chimico nelle cucine professionali. Nuovi valori limite esposizione professionale (VLEP 2025).', date:'10 Feb 2025', readTime:'6 min', tags:['DVR','Sicurezza','Cucine'] },
  { cat:'digitale',   icon:'📱', src:'EU',   urgency:'media',   title:'AI Act UE — Implicazioni per sistemi Revenue Management e CRM', excerpt:'L\'AI Act europeo classifica i sistemi di pricing dinamico e profilazione clienti. Le strutture ricettive che usano AI per yield management devono predisporre la documentazione di conformità.', date:'28 Gen 2025', readTime:'9 min', tags:['AI Act','Revenue','Privacy'] },
  { cat:'ambientale', icon:'🌿', src:'FIPE', urgency:'media',   title:'Plastic Free 2025 — Proroga moratoria plastica monouso', excerpt:'FIPE aggiorna le linee guida sull\'eliminazione della plastica monouso nella ristorazione. Prorogato al 30/06/2025 il termine per esaurimento scorte. Nuove deroghe per packaging a contatto alimenti.', date:'8 Feb 2025', readTime:'4 min', tags:['Plastica','FIPE','Sostenibilità'] },
  { cat:'alimentare', icon:'🍽️', src:'MIN',  urgency:'media',   title:'ISO 22000:2018 — Nuove linee guida FSSC per ristorazione collettiva', excerpt:'Pubblicato l\'aggiornamento delle linee guida FSSC 22000 v6 per la ristorazione collettiva. Novità su prerequisiti operativi, gestione fornitori e tracciabilità digitale.', date:'3 Feb 2025', readTime:'7 min', tags:['ISO22000','FSSC','HACCP'] },
  { cat:'fiscale',    icon:'💶', src:'MIN',  urgency:'media',   title:'Transizione 5.0 — Credito imposta per efficienza energetica hotel', excerpt:'Il piano Transizione 5.0 estende il credito d\'imposta fino al 45% per investimenti in efficientamento energetico abbinati a produzione da fonti rinnovabili. Alberghi fortemente incentivati.', date:'12 Feb 2025', readTime:'5 min', tags:['Transizione5.0','Energia','Incentivi'] },
  { cat:'lavoro',     icon:'👷', src:'EU',   urgency:'media',   title:'Direttiva UE Lavoro Agile — Recepimento nazionale', excerpt:'Recepimento della Direttiva UE sul diritto alla disconnessione e smart working nel settore alberghiero. Obblighi per strutture con +15 dipendenti in merito a accordi individuali e collettivi.', date:'18 Feb 2025', readTime:'5 min', tags:['Smart Working','HR','Direttiva UE'] },
  { cat:'sicurezza',  icon:'🛡️', src:'EU',   urgency:'media',   title:'NIS2 — Cybersecurity obbligatoria per hotel con sistemi PMS cloud', excerpt:'La Direttiva NIS2 recepita in Italia impone misure di cybersecurity per strutture che gestiscono dati personali su sistemi cloud. PMS, POS e booking engine rientrano nell\'ambito.', date:'22 Feb 2025', readTime:'8 min', tags:['NIS2','Cybersecurity','PMS'] },
  { cat:'digitale',   icon:'📱', src:'FIPE', urgency:'bassa',   title:'Scontrino elettronico 2.0 — RT integrati con casse cloud', excerpt:'FIPE pubblica la guida operativa per l\'integrazione dei registratori telematici con sistemi POS cloud. Aggiornamento firmware obbligatorio entro luglio 2025 per RT di prima generazione.', date:'25 Feb 2025', readTime:'4 min', tags:['RT','Scontrino','Fiscale'] },
];

let currentNormFilter = 'all';

function filterNorm(f) {
  currentNormFilter = f;
  document.querySelectorAll('#norme-filters .nm-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick')?.includes("'"+f+"'"));
  });
  renderNorme();
}

function renderNorme() {
  const grid    = document.getElementById('norme-grid');
  const urgEl   = document.getElementById('norme-urgenti');
  const countEl = document.getElementById('norme-count');
  if (!grid) return;

  const filtered = currentNormFilter === 'all' ? NORME : NORME.filter(n => n.cat === currentNormFilter);
  const critica  = filtered.filter(n => n.urgency === 'critica');

  if (countEl) countEl.textContent = filtered.length + ' aggiornamenti';

  if (urgEl) {
    urgEl.innerHTML = critica.map(n => `
      <div class="nm-urgente">
        <div class="nm-urgente-dot"></div>
        <div style="flex:1">
          <span class="pill pill-red" style="margin-right:8px">CRITICA</span>
          <strong style="font-size:13px">${n.title}</strong>
          <span style="font-size:12px;color:var(--txt2);margin-left:10px">${n.date}</span>
        </div>
        <button class="btn btn-danger btn-sm">Approfondisci →</button>
      </div>`).join('');
  }

  const SRC_COLOR = { EU:'var(--g)', MIN:'var(--orange)', FIPE:'var(--green)' };
  const SRC_BG    = { EU:'rgba(201,168,76,.08)', MIN:'rgba(212,128,58,.08)', FIPE:'rgba(106,171,118,.08)' };
  const SRC_LABEL = { EU:'🇪🇺 UE', MIN:'🏛️ Ministero', FIPE:'🤝 FIPE' };
  const URG_COLOR = { critica:'var(--red)', alta:'var(--orange)', media:'var(--txt2)', bassa:'var(--green)' };
  const URG_LABEL = { critica:'CRITICA', alta:'Alta', media:'Media', bassa:'Bassa' };

  grid.innerHTML = filtered.map(n => `
    <div class="nm-card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="background:${SRC_BG[n.src]||'rgba(138,122,90,.07)'};color:${SRC_COLOR[n.src]||'var(--txt2)'};font-size:9px;font-weight:700;padding:3px 9px;border-radius:99px;border:1px solid currentColor;opacity:.9">${SRC_LABEL[n.src]||n.src}</span>
        <span style="font-size:10px;font-weight:700;color:${URG_COLOR[n.urgency]||'var(--txt2)'}">● ${URG_LABEL[n.urgency]||n.urgency}</span>
      </div>
      <div style="font-family:var(--heading);font-size:15px;font-weight:700;color:var(--txt);line-height:1.35;margin-bottom:8px">${n.title}</div>
      <div style="font-size:12px;color:var(--txt2);line-height:1.65;margin-bottom:12px">${n.excerpt}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px">
        ${n.tags.map(t=>`<span class="pill pill-dim">${t}</span>`).join('')}
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line)">
        <span style="font-family:var(--mono);font-size:10px;color:var(--txt2)">${n.date} · ${n.readTime}</span>
        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation()">Leggi →</button>
      </div>
    </div>`).join('');
}

async function cercaBandiNorme(keywords){
  const panel=document.getElementById('nm-bandi-panel');
  const res=document.getElementById('nm-bandi-result');
  if(!panel||!res)return;
  panel.style.display='block';
  res.innerHTML='<div style="color:var(--txt3);padding:12px">⏳ Ricerca bandi in corso…</div>';
  try{
    if(typeof B360==='undefined')throw new Error('SDK');
    const r=await B360.authFetch('/api/bandi/search',{
      method:'POST',
      body:JSON.stringify({keywords,regione:'Sardegna',settore:'hospitality'}),
    });
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    const bandi=d.results?.bandi||d.results||[];
    if(Array.isArray(bandi)&&bandi.length){
      res.innerHTML=bandi.slice(0,4).map(b=>`
        <div style="background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:16px;margin-bottom:10px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--g);letter-spacing:1px;margin-bottom:4px">${b.ente_erogatore||b.ente||'—'} · Scad. ${b.scadenza||'—'}</div>
          <div style="font-weight:700;font-size:14px;font-family:'Syne',sans-serif;margin-bottom:5px">${b.nome||'Bando'}</div>
          <div style="font-size:12px;color:var(--txt2);line-height:1.6">${(b.requisiti||b.descrizione||'').slice(0,200)}…</div>
          ${b.contributo_pct?`<div style="margin-top:8px;color:var(--green);font-weight:700;font-size:12px">✅ ${b.contributo_pct}% a fondo perduto · Max ${b.importo_max||'—'}</div>`:''}
        </div>`).join('');
    }else{
      res.innerHTML=`<div style="font-size:13px;color:var(--txt2);line-height:1.75;padding:12px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:9px">${d.results?.raw||d.raw||'Nessun bando trovato.'}</div>`;
    }
  }catch{
    res.innerHTML='<div style="color:var(--orange);font-size:13px;padding:12px">Avvia il server per la ricerca bandi in tempo reale</div>';
  }
}

document.addEventListener('DOMContentLoaded', ()=>{
  renderNorme();
  if(typeof B360!=='undefined'){
    B360.mountAIWidget('esg','Hotel Baia Sardinia · Normative · HACCP · ISO · ESG');
  }
});
</script>
</body>
</html>
