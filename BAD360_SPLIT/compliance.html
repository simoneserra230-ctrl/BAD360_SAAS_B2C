<!DOCTYPE html>
<html lang="it" data-theme="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BAD360.ai — Compliance Radar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--font,system-ui);font-size:14px}
.w{max-width:1100px;margin:0 auto;padding:26px 24px 80px}
.hd{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden}.hd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--g),var(--gd))}.hd h1{font-family:var(--heading,inherit);font-size:19px;font-weight:800}.hd p{font-size:11.5px;color:var(--txt2);margin-top:3px}
.badge{display:none;align-items:center;gap:5px;padding:3px 9px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:99px;font-size:10px;font-weight:700;color:var(--g);margin-left:auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center}.kpi .v{font-size:1.4rem;font-weight:800;font-family:var(--heading,inherit)}.kpi .l{font-size:9.5px;color:var(--txt3);margin-top:4px;text-transform:uppercase}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.in{background:var(--bg3,#13100b);border:1px solid var(--line2,#2a2620);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:13px;font-family:inherit}.in:focus{outline:none;border-color:rgba(201,168,76,.5)}.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-weight:700;font-size:12.5px;cursor:pointer;border:none;font-family:inherit}.btn-gold{background:linear-gradient(135deg,var(--gd),var(--g));color:#06060A}.btn-sm{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line2,#2a2620);background:none;color:var(--txt2);cursor:pointer;text-decoration:none}
.ob{border:1px solid var(--line);border-left:3px solid var(--line2,#2a2620);border-radius:10px;padding:11px 13px;margin-bottom:8px}
.ob.scaduto{border-left-color:var(--red,#c94a4a)}.ob.in_scadenza{border-left-color:var(--orange,#d4803a)}.ob.da_fare{border-left-color:var(--g)}.ob.ok{border-left-color:var(--green,#6aab76)}
.pill{display:inline-flex;padding:2px 8px;border-radius:99px;font-size:9.5px;font-weight:700;border:1px solid}.p-scaduto{color:var(--red,#c94a4a);border-color:rgba(201,74,74,.35)}.p-in_scadenza{color:var(--orange,#d4803a);border-color:rgba(212,128,58,.35)}.p-da_fare{color:var(--g);border-color:rgba(201,168,76,.35)}.p-ok{color:var(--green,#6aab76);border-color:rgba(106,171,118,.35)}
.chip{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:99px;border:1px solid rgba(201,168,76,.3);color:var(--g);text-decoration:none;margin-right:4px}
.empty{color:var(--txt3);padding:14px;text-align:center;font-size:12.5px}
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid rgba(201,168,76,.3);color:var(--g);padding:11px 18px;border-radius:10px;font-weight:600;z-index:9999;opacity:0;transition:.3s}#toast.show{opacity:1}
</style><link rel="stylesheet" href="bad360-ds.css"><script src="bad360-sdk.js"></script></head><body class="b360-module">
<header class="b360-topbar"><div class="b360-tb-l"><a href="index.html" class="b360-tb-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a><a href="index.html" class="b360-tb-brand" tabindex="-1"><div class="b360-tb-logo">B360</div><span class="b360-tb-name">BAD<strong>360</strong>.ai</span></a><span class="b360-tb-sep"></span><span class="b360-tb-module">Compliance Radar</span></div><div class="b360-tb-r"><a href="../../SKILLSOLUTIONS.COM/index.html" class="b360-tb-hub" style="display:inline-flex;gap:4px;text-decoration:none;color:inherit;opacity:.6;font-size:11px;font-weight:700;padding:4px 10px;border:1px solid currentColor;border-radius:99px;margin-right:8px">&#10022; Hub</a><span class="b360-tb-pill"><span class="b360-tb-dot"></span>v4.1</span><button class="b360-tb-theme" id="b360-theme-btn">☽</button></div></header>
<script>(function(){var t="dark";try{var s=localStorage.getItem("bad360_theme");if(s)t=s}catch(e){}document.documentElement.setAttribute("data-theme",t);document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("b360-theme-btn");if(b){b.textContent=t==="dark"?"☽":"☀";b.onclick=function(){var nt=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nt);b.textContent=nt==="dark"?"☽":"☀";try{localStorage.setItem("bad360_theme",nt)}catch(e){}}}})})()</script>
<div class="w">
  <div class="hd"><div><h1>🛡️ Compliance Radar</h1><p>Imposta il profilo della struttura: vedi gli obblighi applicabili, le scadenze e i collegamenti a bandi (BA.IA) e formazione (Academy). <b>Indicativo — verifica su fonte ufficiale.</b></p></div><span class="badge" id="badge">⚡ Demo</span></div>
  <div class="card">
    <div style="font-weight:700;margin-bottom:8px">🏨 Profilo struttura</div>
    <div class="row"><select id="pTipo" class="in" style="width:140px"><option value="hotel">Hotel</option><option value="b&b">B&B</option><option value="agriturismo">Agriturismo</option><option value="casa_vacanza">Casa vacanza</option><option value="ristorante">Ristorante</option></select><input id="pCam" class="in" type="number" placeholder="Camere" style="width:100px"><input id="pPl" class="in" type="number" placeholder="Posti letto" style="width:110px"><input id="pDip" class="in" type="number" placeholder="Dipendenti" style="width:110px"><input id="pReg" class="in" placeholder="Regione" style="width:120px"></div>
    <div class="row"><label style="font-size:12px;color:var(--txt2);display:flex;gap:5px;align-items:center"><input type="checkbox" id="pCuc"> Cucina</label><label style="font-size:12px;color:var(--txt2);display:flex;gap:5px;align-items:center"><input type="checkbox" id="pPis"> Piscina</label><button class="btn btn-gold" style="margin-left:auto" onclick="saveProfile()">Aggiorna radar</button></div>
  </div>
  <div class="kpis" id="kpis"></div>
  <div id="radar"></div>
</div><div id="toast"></div>
<script>
function logged(){return (typeof B360!=='undefined')&&!!B360.getToken();}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2300);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setDemo(v){document.getElementById('badge').style.display=v?'inline-flex':'none';}
var DEMO={profilo_impostato:true,obblighi:[
 {key:'scia_antincendio',titolo:'SCIA antincendio',categoria:'antincendio',norma:'DPR 151/2011',scadenza_nota:'Struttura >25 p.l.; verifica scadenze',stato:'da_fare',formazione_hint:'Corso antincendio',bando_hint:'Bandi sicurezza'},
 {key:'cin',titolo:'CIN — Codice Identificativo Nazionale',categoria:'turismo',norma:'L.191/2024',scadenza_nota:'Obbligatorio dal nov 2024',stato:'ok'},
 {key:'gdpr',titolo:'Privacy dati ospiti (GDPR)',categoria:'privacy',norma:'Reg. UE 2016/679',scadenza_nota:'Informativa + registro trattamenti',stato:'da_fare'},
 {key:'eaa',titolo:'Accessibilità sito (EAA)',categoria:'digitale',norma:'Dir. UE 2019/882',scadenza_nota:'Dal giu 2025 WCAG 2.1 AA',stato:'da_fare'},
]};
async function loadP(){
  if(!logged())return;
  try{var d=await (await B360.authFetch('/api/compliance/profile')).json();var p=d.profile;if(p){document.getElementById('pTipo').value=p.tipo_struttura||'hotel';document.getElementById('pCam').value=p.n_camere||'';document.getElementById('pPl').value=p.n_posti_letto||'';document.getElementById('pDip').value=p.n_dipendenti||'';document.getElementById('pReg').value=p.regione||'';document.getElementById('pCuc').checked=!!p.cucina;document.getElementById('pPis').checked=!!p.piscina;}}catch(e){}
}
async function load(){
  var data=DEMO,k=null,demo=true;
  if(logged()){try{var d=await (await B360.authFetch('/api/compliance/radar')).json();if(d&&d.ok){data=d;demo=false;}var dk=await (await B360.authFetch('/api/compliance/dashboard')).json();if(dk&&dk.ok)k=dk.kpi;}catch(e){}}
  setDemo(demo);
  if(!k){var ob=data.obblighi;function c(s){return ob.filter(function(o){return o.stato===s}).length}k={scaduti:c('scaduto'),in_scadenza:c('in_scadenza'),da_fare:c('da_fare'),ok:c('ok'),applicabili:ob.length};}
  document.getElementById('kpis').innerHTML=[['Applicabili',k.applicabili,'var(--g)'],['Scaduti',k.scaduti,'var(--red,#c94a4a)'],['In scadenza',k.in_scadenza,'var(--orange,#d4803a)'],['Da fare',k.da_fare,'var(--g)'],['OK',k.ok,'var(--green,#6aab76)']].map(function(x){return '<div class="kpi"><div class="v" style="color:'+x[2]+'">'+x[1]+'</div><div class="l">'+x[0]+'</div></div>'}).join('');
  var box=document.getElementById('radar');
  box.innerHTML=(data.obblighi||[]).map(function(o){
    var hints='';
    if(o.bando_hint)hints+='<a class="chip" href="../../BA.IA.SKILLSOLUTIONS.COM/index.html" title="Trova il bando su BA.IA">🏛️ '+esc(o.bando_hint)+'</a>';
    if(o.formazione_hint)hints+='<a class="chip" href="academy.html" title="Formazione">🎓 '+esc(o.formazione_hint)+'</a>';
    return '<div class="ob '+o.stato+'"><div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap"><div><b>'+esc(o.titolo)+'</b> <span class="pill p-'+o.stato+'">'+o.stato.replace(/_/g," ")+'</span><div style="font-size:12px;color:var(--txt2);margin-top:3px">'+esc(o.scadenza_nota||'')+' · <span style="color:var(--txt3)">'+esc(o.norma||'')+'</span></div><div style="margin-top:5px">'+hints+'</div></div>'
      +'<div style="display:flex;gap:5px;align-items:flex-start">'+(o.stato!=='ok'?'<button class="btn-sm" onclick="mark(\''+o.key+'\')">segna fatto</button>':'')+'</div></div></div>';
  }).join('')||'<div class="empty">Imposta il profilo per vedere gli obblighi.</div>';
}
async function saveProfile(){
  var body={tipo_struttura:document.getElementById('pTipo').value,n_camere:parseInt(document.getElementById('pCam').value)||0,n_posti_letto:parseInt(document.getElementById('pPl').value)||0,n_dipendenti:parseInt(document.getElementById('pDip').value)||0,regione:document.getElementById('pReg').value,cucina:document.getElementById('pCuc').checked,piscina:document.getElementById('pPis').checked};
  if(!logged()){toast('(Demo) Accedi per salvare il profilo reale');return;}
  try{await B360.authFetch('/api/compliance/profile',{method:'PUT',body:JSON.stringify(body)});toast('✓ Radar aggiornato');}catch(e){toast('Errore');return;}
  load();
}
async function mark(key){
  if(!logged()){toast('Accedi per aggiornare');return;}
  var sc=prompt('Data scadenza (YYYY-MM-DD) o vuoto se permanente:','');
  try{await B360.authFetch('/api/compliance/status',{method:'PUT',body:JSON.stringify({obbligo_key:key,fatto:true,data_scadenza:sc||null})});toast('✓');}catch(e){toast('Errore');}
  load();
}
document.addEventListener('DOMContentLoaded',function(){loadP();load();});
</script></body></html>
