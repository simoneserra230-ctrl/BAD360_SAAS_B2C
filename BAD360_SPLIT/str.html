<!DOCTYPE html>
<html lang="it" data-theme="dark"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BAD360.ai — STR / Case Vacanza</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100vh;background:var(--bg);color:var(--txt);font-family:var(--font,system-ui);font-size:14px}
.w{max-width:1140px;margin:0 auto;padding:26px 24px 80px}
.hd{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden}.hd::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--g),var(--gd))}.hd h1{font-family:var(--heading,inherit);font-size:19px;font-weight:800}.hd p{font-size:11.5px;color:var(--txt2);margin-top:3px}
.badge{display:none;align-items:center;gap:5px;padding:3px 9px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:99px;font-size:10px;font-weight:700;color:var(--g);margin-left:auto}
.kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px}.kpi{background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:13px;text-align:center}.kpi .v{font-size:1.4rem;font-weight:800;font-family:var(--heading,inherit)}.kpi .l{font-size:9.5px;color:var(--txt3);margin-top:4px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:1fr 1.2fr;gap:16px}@media(max-width:880px){.grid{grid-template-columns:1fr}}
.sec{font-family:var(--heading,inherit);font-weight:700;font-size:1rem;margin:0 0 10px}.card{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px}
.in{background:var(--bg3,#13100b);border:1px solid var(--line2,#2a2620);border-radius:8px;padding:8px 11px;color:var(--txt);font-size:13px;font-family:inherit;width:100%}.in:focus{outline:none;border-color:rgba(201,168,76,.5)}.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:7px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:8px;font-weight:700;font-size:12.5px;cursor:pointer;border:none;font-family:inherit}.btn-gold{background:linear-gradient(135deg,var(--gd),var(--g));color:#06060A}.btn-x{background:none;border:1px solid var(--line2,#2a2620);color:var(--txt3);border-radius:6px;padding:4px 9px;font-size:11px;cursor:pointer}.btn-sm{font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line2,#2a2620);background:none;color:var(--txt2);cursor:pointer}
.item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:7px;background:var(--bg2)}
.fl{display:inline-block;font-size:9.5px;padding:2px 7px;border-radius:99px;margin-left:5px;border:1px solid}.fl-ok{color:var(--green,#6aab76);border-color:rgba(106,171,118,.35)}.fl-no{color:var(--orange,#d4803a);border-color:rgba(212,128,58,.35)}
.empty{color:var(--txt3);padding:14px;text-align:center;font-size:12.5px}
#toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid rgba(201,168,76,.3);color:var(--g);padding:11px 18px;border-radius:10px;font-weight:600;z-index:9999;opacity:0;transition:.3s}#toast.show{opacity:1}
</style><link rel="stylesheet" href="bad360-ds.css"><script src="bad360-sdk.js"></script></head><body class="b360-module">
<header class="b360-topbar"><div class="b360-tb-l"><a href="index.html" class="b360-tb-back"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></a><a href="index.html" class="b360-tb-brand" tabindex="-1"><div class="b360-tb-logo">B360</div><span class="b360-tb-name">BAD<strong>360</strong>.ai</span></a><span class="b360-tb-sep"></span><span class="b360-tb-module">STR / Case Vacanza</span></div><div class="b360-tb-r"><a href="../../SKILLSOLUTIONS.COM/index.html" class="b360-tb-hub" style="display:inline-flex;gap:4px;text-decoration:none;color:inherit;opacity:.6;font-size:11px;font-weight:700;padding:4px 10px;border:1px solid currentColor;border-radius:99px;margin-right:8px">&#10022; Hub</a><span class="b360-tb-pill"><span class="b360-tb-dot"></span>v4.1</span><button class="b360-tb-theme" id="b360-theme-btn">☽</button></div></header>
<script>(function(){var t="dark";try{var s=localStorage.getItem("bad360_theme");if(s)t=s}catch(e){}document.documentElement.setAttribute("data-theme",t);document.addEventListener("DOMContentLoaded",function(){var b=document.getElementById("b360-theme-btn");if(b){b.textContent=t==="dark"?"☽":"☀";b.onclick=function(){var nt=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",nt);b.textContent=nt==="dark"?"☽":"☀";try{localStorage.setItem("bad360_theme",nt)}catch(e){}}}})})()</script>
<div class="w">
  <div class="hd"><div><h1>🏝️ STR / Ville & Case Vacanza</h1><p>Multi-unità: prenotazioni, turnover pulizie e verifica ospite. La messaggistica ospite usa il Guest Assistant.</p></div><span class="badge" id="badge">⚡ Demo</span></div>
  <div class="kpis" id="kpis"></div>
  <div class="grid">
    <div>
      <div class="sec">🏠 Unità</div>
      <div class="card"><div class="row"><input id="uNome" class="in" placeholder="Nome unità (es. Villa Mare)" style="flex:1"><input id="uCap" class="in" type="number" placeholder="px" style="width:80px"><button class="btn btn-gold" onclick="uAdd()">＋</button></div></div>
      <div id="unitaList"></div>
      <div class="sec" style="margin-top:14px">🧹 Da pulire (turnover)</div>
      <div id="turnover" class="card"></div>
    </div>
    <div>
      <div class="sec">🎟️ Prenotazioni</div>
      <div class="card"><div class="row"><input id="pUn" class="in" placeholder="Unità" style="width:120px"><input id="pOsp" class="in" placeholder="Ospite" style="flex:1;min-width:100px"><select id="pCan" class="in" style="width:110px"><option>diretto</option><option>airbnb</option><option>booking</option><option>altro</option></select></div><div class="row"><input id="pIn" class="in" type="date" style="width:150px"><input id="pOut" class="in" type="date" style="width:150px"><input id="pImp" class="in" type="number" placeholder="€" style="width:90px"><button class="btn btn-gold" onclick="pAdd()">＋</button></div></div>
      <div id="prenList"></div>
    </div>
  </div>
</div><div id="toast"></div>
<script>
function logged(){return (typeof B360!=='undefined')&&!!B360.getToken();}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2300);}
function esc(s){return (s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function eur(n){return '€'+(Math.round((+n||0)*100)/100).toLocaleString('it-IT');}
function setDemo(v){document.getElementById('badge').style.display=v?'inline-flex':'none';}
var DU=[{id:'u1',nome:'Villa Mare',capienza:6,attivo:true}];
var DP=[{id:'p1',unita_nome:'Villa Mare',ospite_nome:'John Smith',canale:'airbnb',check_in:'2026-08-01',check_out:'2026-08-08',importo:1400,stato:'in_corso',verificato:false,pulizia_fatta:false}];
async function jget(p){return (await B360.authFetch(p)).json();}
async function load(){
  var un=DU,pr=DP,k=null,demo=true;
  if(logged()){try{var du=await jget('/api/str/unita');if(du&&du.ok){un=du.unita;demo=false;}var dp=await jget('/api/str/prenotazioni');if(dp&&dp.ok)pr=dp.prenotazioni;var dk=await jget('/api/str/dashboard');if(dk&&dk.ok)k=dk.kpi;}catch(e){}}
  setDemo(demo);
  if(!k){var dapul=pr.filter(function(p){return p.check_out&&!p.pulizia_fatta&&p.stato!=='annullata'}).length;k={unita:un.length,in_corso:pr.filter(function(p){return p.stato==='in_corso'}).length,da_pulire:dapul,ospiti_da_verificare:pr.filter(function(p){return !p.verificato&&p.stato!=='annullata'}).length,ricavo:pr.filter(function(p){return p.stato==='in_corso'||p.stato==='conclusa'}).reduce(function(a,p){return a+(+p.importo||0)},0)};}
  document.getElementById('kpis').innerHTML=[['Unità',k.unita],['In corso',k.in_corso],['Da pulire',k.da_pulire],['Da verificare',k.ospiti_da_verificare],['Ricavo',eur(k.ricavo)]].map(function(x){return '<div class="kpi"><div class="v" style="color:var(--g)">'+x[1]+'</div><div class="l">'+x[0]+'</div></div>'}).join('');
  document.getElementById('unitaList').innerHTML=un.length?un.map(function(u){return '<div class="item" style="display:flex;justify-content:space-between"><span><b>'+esc(u.nome)+'</b> · '+(u.capienza||0)+' px</span><button class="btn-x" onclick="uDel(\''+u.id+'\')">×</button></div>'}).join(''):'<div class="empty">Nessuna unità.</div>';
  var tv=pr.filter(function(p){return p.check_out&&!p.pulizia_fatta&&p.stato!=='annullata'});
  document.getElementById('turnover').innerHTML=tv.length?tv.map(function(p){return '<div style="display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line)"><span>'+esc(p.unita_nome||'')+' · check-out '+esc(p.check_out)+'</span><button class="btn-sm" onclick="pFlag(\''+p.id+'\',\'pulizia_fatta\')">✓ pulita</button></div>'}).join(''):'<div class="empty">Tutto pulito ✨</div>';
  document.getElementById('prenList').innerHTML=pr.length?pr.map(function(p){return '<div class="item"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px"><div><b>'+esc(p.unita_nome||'')+'</b> · '+esc(p.ospite_nome)+' <span class="fl '+(p.verificato?'fl-ok':'fl-no')+'">'+(p.verificato?'verificato':'da verificare')+'</span> <span class="fl '+(p.pulizia_fatta?'fl-ok':'fl-no')+'">'+(p.pulizia_fatta?'pulita':'da pulire')+'</span><div style="font-size:12px;color:var(--txt2);margin-top:2px">'+esc(p.canale)+' · '+(p.check_in||'')+'→'+(p.check_out||'')+' · '+eur(p.importo)+'</div></div><div style="display:flex;gap:5px">'+(!p.verificato?'<button class="btn-sm" onclick="pFlag(\''+p.id+'\',\'verificato\')">verifica</button>':'')+'</div></div></div>'}).join(''):'<div class="empty">Nessuna prenotazione.</div>';
}
async function uAdd(){var n=(document.getElementById('uNome').value||'').trim();if(!n){toast('Nome?');return;}var b={nome:n,capienza:parseInt(document.getElementById('uCap').value)||2};if(!logged()){DU.unshift(Object.assign({id:'u'+Date.now(),attivo:true},b));}else{try{await B360.authFetch('/api/str/unita',{method:'POST',body:JSON.stringify(b)});}catch(e){toast('Errore');return;}}document.getElementById('uNome').value='';load();}
async function uDel(id){if(!logged()){DU=DU.filter(function(u){return u.id!==id});}else{try{await B360.authFetch('/api/str/unita/'+id,{method:'DELETE'});}catch(e){}}load();}
async function pAdd(){var o=(document.getElementById('pOsp').value||'').trim();if(!o){toast('Ospite?');return;}var b={unita_nome:document.getElementById('pUn').value,ospite_nome:o,canale:document.getElementById('pCan').value,check_in:document.getElementById('pIn').value||null,check_out:document.getElementById('pOut').value||null,importo:parseFloat(document.getElementById('pImp').value)||0,stato:'confermata'};if(!logged()){DP.unshift(Object.assign({id:'p'+Date.now(),verificato:false,pulizia_fatta:false},b));}else{try{await B360.authFetch('/api/str/prenotazioni',{method:'POST',body:JSON.stringify(b)});}catch(e){toast('Errore');return;}}document.getElementById('pOsp').value='';load();}
async function pFlag(id,flag){if(!logged()){DP=DP.map(function(p){return p.id===id?Object.assign({},p,(flag==='pulizia_fatta'?{pulizia_fatta:true}:{verificato:true})):p});load();return;}try{await B360.authFetch('/api/str/prenotazioni/'+id+'/flag?'+flag+'=true',{method:'PUT'});toast('✓');}catch(e){toast('Errore');}load();}
document.addEventListener('DOMContentLoaded',load);
</script></body></html>
